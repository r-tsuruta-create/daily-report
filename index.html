<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日報ジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:#0f0f0f;color:#e4e4e7;min-height:100vh;-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom)}
  .hdr{position:sticky;top:0;z-index:100;background:#0f0f0f;padding:16px 16px 0;border-bottom:1px solid #1a1a1f}
  .hdr-inner{max-width:560px;margin:0 auto}
  .hdr h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px}
  .hdr .sub{font-size:12px;color:#52525b;margin-bottom:10px}
  .tabs{display:flex;gap:0;background:#1e1e24;border-radius:8px;padding:3px;margin-bottom:12px}
  .tab{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;border:none;font-family:inherit}
  .tab.on{background:#2563eb;color:#fff}.tab.off{background:transparent;color:#71717a}
  .tab:active{transform:scale(.97)}
  .greet-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .bd{padding:12px 16px 120px;max-width:560px;margin:0 auto}
  input,textarea{font-family:inherit;color:#e4e4e7;background:#1a1a1f;border:1px solid #2a2a30;border-radius:6px;padding:8px 12px;font-size:14px;outline:none;width:100%;cursor:text}
  input:focus,textarea:focus{border-color:#3b82f6}
  input::placeholder,textarea::placeholder{color:#52525b}
  .cd{background:#18181b;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #27272a;position:relative;transition:transform .15s,box-shadow .15s;cursor:grab}
  .cd:active{cursor:grabbing}
  .cd.drag-placeholder{opacity:.25;border:2px dashed #3b82f6}
  .st{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .dt{width:8px;height:8px;border-radius:50%;display:inline-block}
  .bg{background:#27272a;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600;color:#a1a1aa;margin-left:8px}
  .cl{cursor:pointer;border-bottom:1px dashed #3f3f46;padding-bottom:1px}
  .cli{background:transparent;border:none;border-bottom:1px solid #3b82f6;color:#e4e4e7;font-size:13px;font-weight:600;padding:0 4px 2px;outline:none;width:150px}
  .tr{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:6px 4px;border-radius:6px;transition:transform .15s,box-shadow .15s;cursor:grab}
  .tr:active{cursor:grabbing}
  .tr.drag-placeholder{opacity:.25;border:2px dashed #3b82f6}
  .hi{width:60px!important;text-align:center;flex-shrink:0}
  .ni{flex:1;min-width:0}
  .b{border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;-webkit-appearance:none}
  .b:active{transform:scale(.97)}
  .ba{background:#1e293b;color:#94a3b8;border:1px dashed #334155}
  .br{background:transparent;color:#52525b;padding:8px 10px;font-size:18px;line-height:1;border:none;cursor:pointer;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
  .bc{background:#2563eb;color:#fff;padding:14px 32px;font-size:15px;font-weight:600;flex:1}
  .bc.ok{background:#16a34a}
  .bx{background:#27272a;color:#71717a;padding:14px 20px;font-size:14px}
  .bsm{background:#27272a;color:#71717a;padding:4px 10px;font-size:12px}
  .cx{position:absolute;top:12px;right:12px;background:transparent;border:none;color:#3f3f46;font-size:14px;cursor:pointer;padding:2px 6px}
  .pp{background:#1e1e24;border:1px solid #2a2a30;border-radius:8px;padding:8px;margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .pc{background:#27272a;color:#a1a1aa;border:1px solid #333;border-radius:99px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
  .pc:active{background:#2563eb;color:#fff}
  .pc-del{background:#ef4444;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;line-height:16px;text-align:center;cursor:pointer;padding:0;margin-left:4px;vertical-align:middle}
  .preset-add-row{display:flex;gap:6px;align-items:center;margin-top:6px;width:100%}
  .preset-add-input{font-size:12px;padding:5px 8px;flex:1;border-radius:99px}
  .preset-add-btn{background:#2563eb;color:#fff;border:none;border-radius:99px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .fr{display:flex;gap:8px;flex-wrap:wrap}
  .ar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .pv{background:#1a1a1f;border:1px solid #27272a;border-radius:10px;padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;color:#a1a1aa}
  .to{text-align:right;margin-bottom:16px;font-size:15px;font-weight:600}
  .tn{margin-left:8px;font-size:22px}.tu{color:#52525b;font-size:13px;margin-left:2px}
  .tp{background:#27272a;color:#a1a1aa;border:none;border-radius:8px;padding:10px;width:100%;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:8px}
  details>summary{font-size:12px;color:#52525b;cursor:pointer;margin:8px 0}
  .flow-btn{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:10px;width:100%;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:16px}
  .flow-btn:active{transform:scale(.97);background:#2563eb;color:#fff}
  .guide{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:16px;margin-top:12px}
  .guide h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:12px}
  .guide .step{margin-bottom:16px}
  .guide .step-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:#2563eb;color:#fff;border-radius:50%;font-size:12px;font-weight:700;margin-right:8px;flex-shrink:0}
  .guide .step-title{font-size:13px;font-weight:600;color:#e4e4e7;display:flex;align-items:center;margin-bottom:6px}
  .guide .step-desc{font-size:12px;color:#a1a1aa;line-height:1.7;padding-left:32px}
  .drag-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:.85;transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.5);border-radius:10px;background:#18181b}
  .drop-indicator{height:3px;background:#3b82f6;border-radius:2px;transition:all .1s;position:fixed;z-index:9998;pointer-events:none}
  @media(max-width:480px){
    .hdr{padding:12px 12px 0}.bd{padding:12px 12px calc(120px + env(safe-area-inset-bottom))}
    .hi{width:52px!important;font-size:13px;padding:6px 6px}
    .ni{font-size:13px;padding:6px 8px}.b{font-size:12px}
    .bc{padding:16px 16px!important;font-size:16px!important}
    .cd{padding:12px}.pc{font-size:11px;padding:5px 10px}
    .pv{font-size:12px;padding:12px}.cli{width:120px}
  }
</style>
</head>
<body>
<div class="hdr" id="hdr"></div>
<div class="bd" id="bd"></div>
<script>
const DEF_PRESETS=["朝会・夕会等","MTG","定例MTG","内部MTG","顧客MTG","週間MTG準備","週間MTG",
"実装","LWC実装","LWC改修、実装作業","Apex実装","VF実装","フロー改修作業","テスト","単体テスト","テスト仕様書作成",
"設計","要件定義","コードレビュー","調査","資料作成","バグ修正","リリース作業",
"PDI学習","追加要望の実装","収支確認画面作成","承認画面改修","収支報告書PDF化ツールの作成"];
const COLS=["#2563eb","#64748b","#8b5cf6","#ec4899","#14b8a6","#f97316","#84cc16","#06b6d4"];
const DC=()=>[
  {label:"疑似PJ研修",color:"#2563eb",tasks:[{n:"",h:""}]},
  {label:"その他",color:"#64748b",tasks:[{n:"朝会・夕会等",h:"0.5"}]}
];

let P=JSON.parse(localStorage.getItem("presets")||"null")||[...DEF_PRESETS];
function sP(){localStorage.setItem("presets",JSON.stringify(P))}

let WEBHOOK=localStorage.getItem("webhook_url")||"";
function sW(v){WEBHOOK=v.trim();localStorage.setItem("webhook_url",WEBHOOK)}

function saveState(){
  localStorage.setItem("state",JSON.stringify({
    tCats:S.tCats,tMemo:S.tMemo,
    aCats:S.aCats,aMemo:S.aMemo,
    greeting:S.greeting
  }));
}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem("state")||"null");
    if(d){
      if(d.tCats)S.tCats=d.tCats;
      if(d.tMemo)S.tMemo=d.tMemo;
      if(d.aCats)S.aCats=d.aCats;
      if(d.aMemo)S.aMemo=d.aMemo;
      if(d.greeting)S.greeting=d.greeting;
    }
  }catch(e){}
}

let S={
  greeting:"お疲れ様です。退勤いたします。\n本日の研修内容です。",
  tab:"taikin",
  tCats:DC(),tMemo:"",
  aCats:DC(),aMemo:"",
  editGreet:false,editLabel:-1,presets:-1,editPresets:false,
  preview:false,copied:false,sent:"",
  showWebhook:false,showImport:false,
};

// ========== Touch drag system ==========
let drag={active:false,type:null,pfx:null,fromCi:-1,fromTi:-1,ghost:null,indicator:null,targetIdx:-1,holdTimer:null,startY:0,startX:0,el:null,offsetY:0};

function isInteractive(el){
  const tag=el.tagName;
  return tag==='INPUT'||tag==='TEXTAREA'||tag==='BUTTON'||tag==='SELECT'||el.contentEditable==='true'||el.closest('button')||el.closest('.pp')||el.closest('.fr');
}

function findDraggable(el){
  // カテゴリヘッダー(.st)やカテゴリ名をタッチ → カテゴリ移動
  const stEl=el.closest('.st');
  if(stEl){
    const cd=stEl.closest('.cd[data-cat-ci]');
    if(cd)return{type:'cat',el:cd,pfx:cd.dataset.catPfx,ci:parseInt(cd.dataset.catCi),ti:-1};
  }
  // タスク行
  const tr=el.closest('.tr[data-task-ti]');
  if(tr)return{type:'task',el:tr,pfx:tr.dataset.taskPfx,ci:parseInt(tr.dataset.taskCi),ti:parseInt(tr.dataset.taskTi)};
  return null;
}

document.addEventListener('touchstart',function(e){
  if(drag.active)return;
  const touch=e.touches[0];
  const target=document.elementFromPoint(touch.clientX,touch.clientY);
  if(!target||isInteractive(target))return;
  const info=findDraggable(target);
  if(!info)return;

  drag.startX=touch.clientX;drag.startY=touch.clientY;
  drag.type=info.type;drag.pfx=info.pfx;drag.fromCi=info.ci;drag.fromTi=info.ti;

  drag.holdTimer=setTimeout(()=>{

    drag.active=true;
    drag.el=info.el;
    const rect=info.el.getBoundingClientRect();
    drag.offsetY=touch.clientY-rect.top;
    // Ghost
    const ghost=info.el.cloneNode(true);
    ghost.style.cssText=`position:fixed;z-index:9999;pointer-events:none;opacity:.85;transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.5);border-radius:${info.type==='cat'?'10px':'6px'};background:#18181b;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;margin:0;`;
    document.body.appendChild(ghost);
    drag.ghost=ghost;
    info.el.classList.add('drag-placeholder');
    // Indicator
    const ind=document.createElement('div');
    ind.className='drop-indicator';
    ind.style.display='none';
    document.body.appendChild(ind);
    drag.indicator=ind;
    if(navigator.vibrate)navigator.vibrate(20);
  },80);
},{passive:true});

document.addEventListener('touchmove',function(e){
  if(!drag.active){
    if(drag.holdTimer){
      const t=e.touches[0];
      if(Math.abs(t.clientX-drag.startX)>8||Math.abs(t.clientY-drag.startY)>8){
        clearTimeout(drag.holdTimer);drag.holdTimer=null;
      }
    }
    return;
  }
  e.preventDefault();
  const touch=e.touches[0];
  if(drag.ghost)drag.ghost.style.top=(touch.clientY-drag.offsetY)+'px';

  // Find targets
  const sel=drag.type==='task'
    ?`[data-task-pfx="${drag.pfx}"][data-task-ci="${drag.fromCi}"]`
    :`[data-cat-pfx="${drag.pfx}"]`;
  const els=document.querySelectorAll(sel);
  let closest=null,closestDist=Infinity,closestIdx=-1,before=true;
  els.forEach(el=>{
    const r=el.getBoundingClientRect();
    const mid=r.top+r.height*0.5;
    const dist=Math.abs(touch.clientY-mid);
    if(dist<closestDist){
      closestDist=dist;closest=el;
      closestIdx=drag.type==='task'?parseInt(el.dataset.taskTi):parseInt(el.dataset.catCi);
      before=touch.clientY<mid;
    }
  });

  if(closest&&drag.indicator){
    const r=closest.getBoundingClientRect();
    const zone=r.height*0.0;
    const inDeadZone=Math.abs(touch.clientY-(r.top+r.height*0.5))<zone;
    if(!inDeadZone){
      drag.indicator.style.display='block';
      drag.indicator.style.left=r.left+'px';
      drag.indicator.style.width=r.width+'px';
      drag.indicator.style.top=(before?r.top-2:r.bottom)+'px';
      drag.targetIdx=before?closestIdx:closestIdx+1;
    }
  }

  // Auto-scroll
  if(touch.clientY<60)window.scrollBy(0,-10);
  else if(touch.clientY>window.innerHeight-60)window.scrollBy(0,10);
},{passive:false});

document.addEventListener('touchend',finishDrag);
document.addEventListener('touchcancel',finishDrag);

function finishDrag(){
  clearTimeout(drag.holdTimer);drag.holdTimer=null;
  if(!drag.active){drag.active=false;return}
  if(drag.ghost){drag.ghost.remove();drag.ghost=null}
  if(drag.indicator){drag.indicator.remove();drag.indicator=null}
  if(drag.el){drag.el.classList.remove('drag-placeholder');drag.el=null}

  const list=getList(drag.pfx);
  if(drag.targetIdx>=0){
    if(drag.type==='task'){
      const tasks=list[drag.fromCi].tasks;
      let from=drag.fromTi,to=drag.targetIdx;
      if(to>from)to--;
      if(from!==to&&to>=0&&to<tasks.length){
        const item=tasks.splice(from,1)[0];tasks.splice(to,0,item);
      }
    }else{
      let from=drag.fromCi,to=drag.targetIdx;
      if(to>from)to--;
      if(from!==to&&to>=0&&to<list.length){
        const item=list.splice(from,1)[0];list.splice(to,0,item);
      }
    }
  }
  drag.active=false;drag.type=null;drag.targetIdx=-1;
  R(1);
}

// ========== Mouse drag (PC) ==========
document.addEventListener('mousedown',function(e){
  if(drag.active||e.button!==0)return;
  const target=e.target;
  if(isInteractive(target))return;
  const info=findDraggable(target);
  if(!info)return;
  e.preventDefault();
  drag.startX=e.clientX;drag.startY=e.clientY;
  drag.type=info.type;drag.pfx=info.pfx;drag.fromCi=info.ci;drag.fromTi=info.ti;
  drag._mouseInfo=info;
  drag._mouseMoved=false;
});

document.addEventListener('mousemove',function(e){
  if(!drag._mouseInfo)return;
  const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;
  if(!drag.active&&!drag._mouseMoved){
    if(Math.abs(dx)<5&&Math.abs(dy)<5)return;
    drag._mouseMoved=true;
    drag.active=true;
    const info=drag._mouseInfo;
    drag.el=info.el;
    const rect=info.el.getBoundingClientRect();
    drag.offsetY=e.clientY-rect.top;
    const ghost=info.el.cloneNode(true);
    ghost.style.cssText=`position:fixed;z-index:9999;pointer-events:none;opacity:.85;transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.5);border-radius:${info.type==='cat'?'10px':'6px'};background:#18181b;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;margin:0;`;
    document.body.appendChild(ghost);
    drag.ghost=ghost;
    info.el.classList.add('drag-placeholder');
    const ind=document.createElement('div');
    ind.className='drop-indicator';ind.style.display='none';
    document.body.appendChild(ind);
    drag.indicator=ind;
  }
  if(!drag.active)return;
  e.preventDefault();
  if(drag.ghost)drag.ghost.style.top=(e.clientY-drag.offsetY)+'px';
  const sel=drag.type==='task'
    ?`[data-task-pfx="${drag.pfx}"][data-task-ci="${drag.fromCi}"]`
    :`[data-cat-pfx="${drag.pfx}"]`;
  const els=document.querySelectorAll(sel);
  let closest=null,closestDist=Infinity,closestIdx=-1,before=true;
  els.forEach(el=>{
    const r=el.getBoundingClientRect();
    const mid=r.top+r.height/2;
    const dist=Math.abs(e.clientY-mid);
    if(dist<closestDist){closestDist=dist;closest=el;closestIdx=drag.type==='task'?parseInt(el.dataset.taskTi):parseInt(el.dataset.catCi);before=e.clientY<mid}
  });
  if(closest&&drag.indicator){
    const r=closest.getBoundingClientRect();
    const zone=r.height*0.0;
    const inDeadZone=Math.abs(e.clientY-(r.top+r.height*0.5))<zone;
    if(!inDeadZone){
      drag.indicator.style.display='block';drag.indicator.style.left=r.left+'px';drag.indicator.style.width=r.width+'px';drag.indicator.style.top=(before?r.top-2:r.bottom)+'px';
      drag.targetIdx=before?closestIdx:closestIdx+1;
    }
  }
  if(e.clientY<60)window.scrollBy(0,-10);
  else if(e.clientY>window.innerHeight-60)window.scrollBy(0,10);
});

document.addEventListener('mouseup',function(){
  if(drag._mouseInfo){
    if(drag.active)finishDrag();
    drag._mouseInfo=null;drag._mouseMoved=false;drag.active=false;
  }
});

// ========== Core ==========
function th(l,ci){return l[ci].tasks.reduce((s,t)=>s+(parseFloat(t.h)||0),0)}
function gtl(l){return l.reduce((s,_,i)=>s+th(l,i),0)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

function genCatsText(list){
  let L=[];
  list.forEach(c=>{const ts=c.tasks.filter(t=>t.n&&t.h);if(!ts.length)return;
    L.push("\uFF1C"+c.label+"\uFF1E");
    ts.forEach(t=>L.push(parseFloat(t.h).toFixed(1)+"h\uFF5C"+t.n))});
  return L.join("\n");
}
function genTaikin(){
  let L=[S.greeting,"",genCatsText(S.tCats)];
  return L.join("\n");
}
function genAsa(){
  return genCatsText(S.aCats);
}
function curMemo(){return S.tab==="taikin"?S.tMemo:S.aMemo}
function curText(){return S.tab==="taikin"?genTaikin():genAsa()}
function curList(){return S.tab==="taikin"?S.tCats:S.aCats}
function curPfx(){return S.tab==="taikin"?"t":"a"}

function rCats(list,pfx){
  let o="";
  list.forEach((c,ci)=>{
    o+=`<div class="cd" data-cat-pfx="${pfx}" data-cat-ci="${ci}">`;
    if(list.length>1)o+=`<button class="cx" onclick="rC('${pfx}',${ci})">×</button>`;
    o+=`<div class="st"><span class="dt" style="background:${c.color}"></span>`;
    if(S.editLabel===ci&&curPfx()===pfx){
      o+=`<input class="cli" id="li${ci}" value="${esc(c.label)}"><button class="b bsm" onclick="sL('${pfx}',${ci})">完了</button>`;
    }else{o+=`<span class="cl" onclick="S.editLabel=${ci};R(1)">${esc(c.label)}</span>`}
    o+=`<span class="bg">${th(list,ci).toFixed(1)}h</span></div>`;
    c.tasks.forEach((t,ti)=>{
      o+=`<div class="tr" data-task-pfx="${pfx}" data-task-ci="${ci}" data-task-ti="${ti}">`;
      o+=`<input class="hi" type="text" inputmode="decimal" placeholder="h" value="${esc(t.h)}" oninput="uT('${pfx}',${ci},${ti},'h',this.value)" onblur="R(1)">`;
      o+=`<input class="ni" placeholder="タスク内容" value="${esc(t.n)}" oninput="uT('${pfx}',${ci},${ti},'n',this.value)" onblur="R(1)">`;
      o+=`<button class="br" onclick="dT('${pfx}',${ci},${ti})">×</button></div>`;
    });
    o+=`<div class="fr"><button class="b ba" onclick="aT('${pfx}',${ci})">+ タスク</button>`;
    o+=`<button class="b ba" onclick="tPr('${pfx}',${ci})">プリセット</button></div>`;
    if(S.presets===ci&&curPfx()===pfx){
      o+=`<div class="pp">`;
      if(S.editPresets){
        P.forEach((p,pi)=>{o+=`<span class="pc">${esc(p)}<button class="pc-del" onclick="delP(${pi})">×</button></span>`});
        o+=`<div class="preset-add-row"><input class="preset-add-input" id="newP" placeholder="新しいプリセット"><button class="preset-add-btn" onclick="addP()">追加</button></div>`;
        o+=`<div style="width:100%;margin-top:4px"><button class="b bsm" onclick="S.editPresets=false;R(1)">完了</button></div>`;
      }else{
        P.forEach(p=>{o+=`<button class="pc" onclick="aPs('${pfx}',${ci},'${esc(p)}')">${esc(p)}</button>`});

// ========== インポート ==========
function parseImportText(text){
  // 改行がない場合、＜＞/<>の前に改行を挿入して正規化
  let normalized = text
    .replace(/([＜<][^＞>]+[＞>])/g, '\n$1\n')  // カテゴリ前後に改行
    .replace(/(\d+\.?\d*h)[　 ]/g, '\n$1｜')      // Xh＋全角スペース → 改行+｜
    .replace(/【備考】/g, '\n【備考】\n')
    .split('\n').map(l=>l.trim()).filter(l=>l);

  const cats=[];
  let cur=null;
  let memoMode=false;
  const memoLines=[];

  for(const line of normalized){
    if(line==='【備考】'){memoMode=true;continue}
    if(memoMode){memoLines.push(line);continue}

    const catMatch=line.match(/^[＜<](.+)[＞>]$/);
    if(catMatch){
      cur={label:catMatch[1],color:COLS[cats.length%COLS.length],tasks:[]};
      cats.push(cur);
      continue;
    }
    const taskMatch=line.match(/^([\d.]+)h[｜|](.+)$/);
    if(taskMatch&&cur){
      cur.tasks.push({h:taskMatch[1],n:taskMatch[2].trim()});
    }
  }

  cats.forEach(c=>{if(c.tasks.length===0)c.tasks.push({n:'',h:''})});
  return cats.length>0?{cats,memo:memoLines.join('\n')}:null;
}

function execImport(mode){
  const text=document.getElementById('import_textarea')?.value||'';
  const result=parseImportText(text);
  if(!result){
    alert('読み込めませんでした。\n形式を確認してください。');
    return;
  }
  if(mode==='overwrite'){
    if(S.tab==='taikin'){S.tCats=result.cats;if(result.memo)S.tMemo=result.memo;}
    else{S.aCats=result.cats;if(result.memo)S.aMemo=result.memo;}
  }else{
    // 追加モード：既存カテゴリの後ろに足す
    if(S.tab==='taikin'){
      S.tCats=[...S.tCats,...result.cats];
      if(result.memo)S.tMemo=(S.tMemo?S.tMemo+'\n':'')+result.memo;
    }else{
      S.aCats=[...S.aCats,...result.cats];
      if(result.memo)S.aMemo=(S.aMemo?S.aMemo+'\n':'')+result.memo;
    }
  }
  S.showImport=false;
  R(1);
}

function postToSlack(text){
  return fetch(WEBHOOK,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"payload="+encodeURIComponent(JSON.stringify({text}))
  });
}

async function sendSlack(){
  if(!WEBHOOK){S.showWebhook=true;R(1);return}
  const main=curText();
  const memo=curMemo().trim();
  try{
    await postToSlack(main);
    if(memo){
      await postToSlack("【備考】\n"+memo);
    }
    S.sent="ok";R(1);setTimeout(()=>{S.sent="";R(1)},1300);
  }catch(e){
    S.sent="err";R(1);setTimeout(()=>{S.sent="";R(1)},1300);
